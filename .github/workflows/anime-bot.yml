name: anime-bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 🟢 CLONAR REPO
      # ======================
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # 🟢 NODE
      # ======================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ======================
      # 🟢 CREAR ENTORNO NODE
      # ======================
      - name: Init project
        run: |
          npm init -y
          npm pkg set type=module

      # ======================
      # 🟢 INSTALAR DEPENDENCIAS
      # ======================
      - name: Install dependencies
        run: npm install node-fetch@3

      # ======================
      # 🟢 DEBUG (MUY IMPORTANTE)
      # ======================
      - name: Show files
        run: ls -R

      # ======================
      # 🟢 EJECUTAR BOT
      # ======================
      - name: Run bot
        run: node bot.js

      # ======================
      # 🟢 GUARDAR CACHE
      # ======================
      - name: Commit changes
        run: |
          git config --global user.name "anime-bot"
          git config --global user.email "bot@anime.com"
          git add .
          git commit -m "update cache" || echo "no changes"
          git push
